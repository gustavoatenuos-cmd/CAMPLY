name: Supabase Staging Dry Run

on:
    workflow_dispatch:
permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      STAGING_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate staging configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Missing STAGING_DB_PASSWORD"; exit 1; }
          test -n "$STAGING_PROJECT_ID" || { echo "Missing STAGING_PROJECT_ID"; exit 1; }

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_PROJECT_ID"

      - name: Preview pending migrations
        run: supabase db push --dry-run

      - name: List migration state
        run: supabase migration list

      - name: Summary
        run: |
          {
            echo "## Supabase staging dry run"
            echo ""
            echo "- Staging project linked"
            echo "- Pending migrations previewed"
            echo "- No migration applied"
            echo "- No Edge Function deployed"
            echo "- Production not changed"
          } >> "$GITHUB_STEP_SUMMARY"
