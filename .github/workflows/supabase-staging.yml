name: Supabase Staging Validation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Validate only or apply migrations and deploy meta-sync-ads to staging
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - deploy

permissions:
  contents: read

concurrency:
  group: supabase-staging-meta-analytics
  cancel-in-progress: false

jobs:
  staging:
    name: Validate Meta analytics on staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      STAGING_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate staging configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Missing STAGING_DB_PASSWORD"; exit 1; }
          test -n "$STAGING_PROJECT_ID" || { echo "Missing STAGING_PROJECT_ID"; exit 1; }

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_PROJECT_ID"

      - name: Show pending migrations
        run: supabase db push --dry-run

      - name: Apply migrations to staging
        if: ${{ inputs.mode == 'deploy' }}
        run: supabase db push

      - name: Deploy Meta sync Edge Function to staging
        if: ${{ inputs.mode == 'deploy' }}
        run: supabase functions deploy meta-sync-ads --project-ref "$STAGING_PROJECT_ID"

      - name: List migration state
        run: supabase migration list

      - name: Install PostgreSQL client
        if: ${{ inputs.mode == 'deploy' }}
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run schema smoke checks
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$STAGING_DATABASE_URL" || {
            echo "Missing STAGING_DATABASE_URL; cannot run schema smoke checks."
            exit 1
          }
          psql "$STAGING_DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/meta_analytics_smoke.sql

      - name: Staging gate summary
        shell: bash
        run: |
          {
            echo "## Supabase staging gate"
            echo ""
            echo "- Mode: ${{ inputs.mode }}"
            echo "- Project ref: configured"
            echo "- Migration dry-run: completed"
            if [ "${{ inputs.mode }}" = "deploy" ]; then
              echo "- Migrations: applied to staging"
              echo "- Edge Function: meta-sync-ads deployed to staging"
              echo "- Schema smoke checks: passed"
            else
              echo "- No migration or function was deployed"
            fi
            echo "- Production was not changed"
          } >> "$GITHUB_STEP_SUMMARY"
